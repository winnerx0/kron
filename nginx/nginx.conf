worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:5000;
    }

    upstream frontend {
        server frontend:3000;
    }

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s burst=10;

    server {
        listen 80;
        server_name kron.winnerx0.dev;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name kron.winnerx0.dev;

        ssl_certificate /etc/letsencrypt/live/kron.winnerx0.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kron.winnerx0.dev/privkey.pem;


        location /api/ {
            limit_req zone=api_limit;
            limit_req_status @too_many_requests;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location @too_many_requests {
            default_type application/json;
            return 429 '{"message": "Too Many Requests"}';
        }
    }

}