basePath: /
definitions:
  execution.Execution:
    properties:
      finished:
        type: string
      id:
        type: string
      jobID:
        type: string
      started:
        type: string
      status:
        $ref: '#/definitions/execution.ExecutionStatus'
    type: object
  execution.ExecutionStatus:
    enum:
    - pending
    - success
    - failed
    type: string
    x-enum-varnames:
    - PENDING
    - SUCCESS
    - FAILED
  job.CreateJobRequest:
    properties:
      body:
        type: string
      description:
        type: string
      endpoint:
        type: string
      headers:
        additionalProperties: {}
        type: object
      method:
        enum:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        type: string
      name:
        type: string
      schedule:
        type: string
    required:
    - endpoint
    - headers
    - method
    - name
    - schedule
    type: object
  job.CreateJobResponse:
    properties:
      body:
        type: string
      description:
        type: string
      endpoint:
        type: string
      headers:
        additionalProperties: {}
        type: object
      id:
        type: string
      method:
        type: string
      name:
        type: string
      schedule:
        type: string
    type: object
  job.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  job.JobResponse:
    properties:
      body:
        type: string
      description:
        type: string
      endpoint:
        type: string
      headers:
        additionalProperties: {}
        type: object
      id:
        type: string
      method:
        type: string
      name:
        type: string
      schedule:
        type: string
    type: object
  job.UpdateJobRequest:
    properties:
      body:
        type: string
      description:
        type: string
      endpoint:
        type: string
      headers:
        additionalProperties: {}
        type: object
      method:
        type: string
      name:
        type: string
      schedule:
        type: string
    type: object
  job.UpdateJobResponse:
    properties:
      body:
        type: string
      description:
        type: string
      endpoint:
        type: string
      headers:
        additionalProperties: {}
        type: object
      id:
        type: string
      method:
        type: string
      name:
