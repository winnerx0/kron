host: localhost:5000
info:
  contact: {}
  description: This is a simple API for scheduling and executing jobs.
  title: Kron API
  version: "1.0"
paths:
  /execution/all:
    get:
      description: Get a list of all executions
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/execution.Execution'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Find all executions
      tags:
      - executions
  /job/all:
    get:
      description: Find all created jobs
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/job.JobResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/job.ErrorResponse'
      summary: Find all jobs
  /job/create:
    post:
      consumes:
      - application/json
      description: Creates a new job.
      parameters:
      - description: Job
        in: body
        name: job
        required: true
        schema:
          $ref: '#/definitions/job.CreateJobRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/job.CreateJobResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/job.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/job.ErrorResponse'
      summary: Create a job
  /jobs/{jobID}:
    delete:
      description: Delete a job by its ID
      parameters:
      - description: Job ID
        in: path
        name: jobID
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/job.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/job.ErrorResponse'
      summary: Delete a job
    put:
      description: Update a job by its ID
      parameters:
      - description: Job ID
        in: path
        name: jobID
        required: true
        type: string
      - description: Job
        in: body
        name: job
        required: true
        schema:
          $ref: '#/definitions/job.UpdateJobRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/job.UpdateJobResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/job.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/job.ErrorResponse'
      summary: Update a job
swagger: "2.0"
